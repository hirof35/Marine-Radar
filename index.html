<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marine Radar Simulator</title>
  </head>
  <body>
    <div id="app">
      <h1>航海レーダー シミュレーター</h1>
      
      <!-- レーダー描画用のキャンバス -->
      <canvas id="radarCanvas" width="500" height="500"></canvas>

      <!-- コントロールパネル -->
      <div class="controls">
        <div class="control-group">
          <label>レンジ (探知範囲): </label>
          <select id="rangeSelect">
            <option value="6">6 NM (近距離)</option>
            <option value="12" selected>12 NM (標準)</option>
            <option value="24">24 NM (遠距離)</option>
          </select>
        </div>

        <div class="control-group">
          <label>画面表示モード: </label>
          <select id="modeSelect">
            <option value="north-up" selected>North-Up (真北上)</option>
            <option value="head-up">Head-Up (針路上)</option>
          </select>
        </div>

        <div class="control-group">
          <label>海面反射抑制 (Sea Clutter): </label>
          <input type="range" id="clutterRange" min="0" max="100" value="30">
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
